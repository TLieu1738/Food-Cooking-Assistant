<!DOCTYPE html>
<html><head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Food Scanner</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 0 auto; padding: 16px; }
    video, canvas { width: 100%; border-radius: 12px; }
    button { width: 100%; padding: 14px; background: #1D9E75;
             color: white; border: none; border-radius: 10px;
             font-size: 16px; margin: 12px 0; cursor: pointer; }
    #result { margin-top: 16px; }
    .card { background: #f5f5f5; border-radius: 10px;
            padding: 14px; margin-bottom: 10px; }
    .food-title { font-size: 22px; font-weight: 600; }
    .meta { color: #666; font-size: 14px; margin: 4px 0; }
    .recipe-name { font-weight: 600; margin: 8px 0 4px; }
    ol { margin: 4px 0; padding-left: 18px; font-size: 14px; }
  </style>

</head><body>
  <h2>Food Scanner</h2>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" style="display:none"></canvas>
  <button onclick="scan()">Scan Food</button>
  <div id="status">Starting camera...</div>
  <div id="result"></div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const status = document.getElementById("status");
    //Hardcoded user profile for testing
    const userProfile = {
      age: 35,
      goal: "Bulking",
      diet: "high protein",
      activity_level: "moderate"
    };

    async function init() {
      const stream = await navigator.mediaDevices.getUserMedia(
        { video: { facingMode: "environment" } }
      );
      video.srcObject = stream;
      status.textContent = "Ready — point at food and tap Scan";
    }

    async function scan() {
      status.textContent = "Scanning...";
      // capture frame
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0);
      // convert to base64 JPEG (0.7 quality to reduce size/cost)
      const base64 = canvas.toDataURL("image/jpeg", 0.7).split(",")[1];
      // send image to backend
      const res = await fetch("/recipes", {
        method: "POST",
        headers: { "Content-Type": "application/json",
                "ngrok-skip-browser-warning": "true"
        },
        body: JSON.stringify({ image: base64 })
      });
      const data = await res.json();
      showResults(data);

      //Call AI nutrition coach
      status.textContent = "Getting nutrition advice, bear with me gng";

      const coachRes = await fetch("/nutrition-coach", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "ngrok-skip-browser-warning": "true"
        },
        body: JSON.stringify({
          user_profile: userProfile,
          food_data: data
        })

      });

      const advice = await coachRes.json();

      showCoachAdvice(advice);
      status.textContent = "Done!";
    }

    function showResults(data) {
      if (data.error === "not_food") {
        status.textContent = "Not food detected — try again!";
        document.getElementById("result").innerHTML = "";
        return;
      }
      status.textContent = "Done!";
      let html = `<div class="card">
        <div class="food-title">${data.food_name}</div>
        <div class="meta">Ingredients: ${data.ingredients}</div>
        <div class="meta">Calories: ~${data.calories_per_serving} kcal/serving</div>
        <div class="meta">Cost: ~£${data.cost_per_serving_gbp.toFixed(2)}/serving</div>
        <div class="meta">Protein: ${data.macros.protein_g}g &nbsp;
          Carbs: ${data.macros.carbs_g}g &nbsp; Fat: ${data.macros.fat_g}g</div>
      </div>`;
      data.recipes.forEach(r => {
        html += `<div class="card">
          <div class="recipe-name">${r.name}</div>
          <div class="meta">${r.difficulty} · ${r.time_minutes} min · £${r.cost_gbp.toFixed(2)}</div>
          <ol>${r.steps.map(s => `<li>${s}</li>`).join("")}</ol>
        </div>`;
      });
      document.getElementById("result").innerHTML = html;
    }

    function showCoachAdvice(advice) {

      if (!advice || advice.error) return;
      
      let html = `
        <div class="card">
          <div class="food-title"> AI Nutrition Coach</div>
          <div class="meta"><b>Health Score:</b> ${advice.health_score}/10</div>
          <div class="meta">${advice.summary}</div>

          <div class="recipe-name"> Good Points</div>
          <ul>${advice.good_points.map(p => `<li>${p}</li>`).join("")}</ul>

          <div class="recipe-name"> Improvements</div>
          <ul>${advice.improvements.map(p => `<li>${p}</li>`).join("")}</ul>

          <div class="meta"><b>Next Meal:</b> ${advice.next_meal_suggestion}</div>
        </div>
      `;

      document.getElementById("result").innerHTML += html;


    }

    init();
  </script>
</body></html>
